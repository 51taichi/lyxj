<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>目标详情 · UI 原型</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
  <div class="phone-frame">
    <div class="page-bg"><img src="../assets/detail/page-bg.png" alt=""></div>

    <header class="page-header page-scroll">
      <a class="page-header__back" href="goals.html">
        <img src="../assets/detail/icon-back.png" alt="返回">
      </a>
      <h1 class="page-header__title">目标详情</h1>
      <button class="page-header__action" type="button">
        <img src="../assets/detail/icon-edit.png" alt="编辑">
      </button>
    </header>

    <div class="page-scroll page-content" style="padding-top:0">
      <section class="detail-goal">
        <img class="detail-goal__icon" src="../assets/detail/icon-rocket-xl.png" alt="">
        <div class="detail-goal__body">
          <div class="detail-goal__title">提升产品设计能力</div>
          <div class="detail-goal__desc">每天专注学习设计2小时</div>
        </div>
        <span class="btn-status">进行中</span>
      </section>

      <section class="stat-row">
        <div class="stat-col">
          <div class="stat-col__value stat-col__value--primary">1.4<span class="stat-col__unit"> 小时</span></div>
          <div class="stat-col__label">今日进度</div>
        </div>
        <div class="stat-col">
          <div class="stat-col__value">18.5<span class="stat-col__unit"> 小时</span></div>
          <div class="stat-col__label">本周进度</div>
        </div>
        <div class="stat-col">
          <div class="stat-col__value">75<span class="stat-col__unit"> %</span></div>
          <div class="stat-col__label">完成度</div>
        </div>
      </section>

      <section class="chart-area card card--flat">
        <div class="section-header" style="margin-bottom:0;padding:16px 16px 0">
          <h2 class="section-header__title">进度统计</h2>
          <div class="chart-tabs">
            <span class="chart-tab chart-tab--active">日</span>
            <span class="chart-tab">周</span>
            <span class="chart-tab">月</span>
            <span class="chart-tab">年</span>
          </div>
        </div>
        <img class="chart-area__img" src="../assets/detail/chart-bars.png" alt="进度柱状图">
      </section>

      <div class="section-header">
        <h2 class="section-header__title">最近记录</h2>
        <a class="section-header__link" href="#">
          查看更多 <img src="../assets/detail/icon-chevron.png" alt="">
        </a>
      </div>

      <div class="card card--flat" style="padding:0 16px">
        <div class="record-item">
          <img class="record-item__icon-img" src="../assets/detail/icon-clock-record.png" alt="">
          <div class="record-item__body">
            <div class="record-item__title">专注学习设计系统</div>
            <div class="record-item__time">今天 14:30-15:15</div>
          </div>
          <div class="record-item__duration">45 <span>分钟</span></div>
        </div>
        <div class="record-item">
          <img class="record-item__icon-img" src="../assets/detail/icon-ux-record.png" alt="">
          <div class="record-item__body">
            <div class="record-item__title">研究用户体验案例</div>
            <div class="record-item__time">今天 10:00-11:30</div>
          </div>
          <div class="record-item__duration">90 <span>分钟</span></div>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <a class="bottom-nav__item" href="goals.html">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-home-3.png" alt="">
        首页
      </a>
      <a class="bottom-nav__item bottom-nav__item--active" href="detail.html">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-goals-3.png" alt="">
        目标
      </a>
      <a class="bottom-nav__item" href="focus.html">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-focus-3.png" alt="">
        专注
      </a>
      <a class="bottom-nav__item" href="detail.html">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-stats-3.png" alt="">
        统计
      </a>
      <a class="bottom-nav__item" href="#">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-profile-3.png" alt="">
        我的
      </a>
    </nav>
  </div>
</body>
</html>
