<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>专注执行 · UI 原型</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
  <div class="phone-frame">
    <div class="page-bg"><img src="../assets/focus/page-bg.png" alt=""></div>

    <div class="page-scroll page-content page-content--no-nav">
      <header class="focus-header">
        <div class="focus-header__title">
          专注执行
          <img src="../assets/focus/icon-dropdown.png" alt="">
        </div>
        <div class="focus-header__actions">
          <img src="../assets/focus/icon-music.png" alt="音乐">
          <img src="../assets/focus/icon-more.png" alt="更多">
        </div>
      </header>

      <section class="current-goal">
        <img class="current-goal__icon" src="../assets/focus/icon-rocket-lg.png" alt="">
        <div>
          <span class="btn-tag">当前目标</span>
          <div class="current-goal__title">提升产品设计能力</div>
          <div class="current-goal__desc">每天专注学习设计2小时</div>
        </div>
      </section>

      <section class="timer-section">
        <div class="timer-ring">
          <img class="timer-ring__bg" src="../assets/focus/timer-ring.png" alt="">
          <div class="timer-ring__overlay">
            <div class="timer-ring__status">专注中</div>
            <div class="timer-ring__time">45:00</div>
          </div>
          <img class="timer-ring__pause" src="../assets/focus/timer-pause.png" alt="暂停">
        </div>
        <p class="timer-summary">今日已专注 <strong>1.4</strong> 小时</p>
      </section>

      <div class="quick-cards">
        <div class="quick-card">
          <img class="quick-card__icon" src="../assets/focus/icon-clock.png" alt="">
          <div>
            <div class="quick-card__title">专注计划</div>
            <div class="quick-card__sub">2小时</div>
          </div>
          <img class="quick-card__arrow" src="../assets/focus/icon-chevron.png" alt="">
        </div>
        <div class="quick-card">
          <img class="quick-card__icon" src="../assets/focus/icon-records.png" alt="">
          <div>
            <div class="quick-card__title">专注记录</div>
            <div class="quick-card__sub">查看历史</div>
          </div>
          <img class="quick-card__arrow" src="../assets/focus/icon-chevron.png" alt="">
        </div>
      </div>

      <button class="btn-end" type="button">
        <img class="btn-end__bg" src="../assets/focus/btn-end-bg.png" alt="">
        <span class="btn-end__text">结束专注</span>
      </button>
    </div>

    <nav class="bottom-nav">
      <a class="bottom-nav__item" href="goals.html">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-home-2.png" alt="">
        首页
      </a>
      <a class="bottom-nav__item" href="goals.html">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-goals-2.png" alt="">
        目标
      </a>
      <a class="bottom-nav__item bottom-nav__item--active" href="focus.html">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-focus-2.png" alt="">
        专注
      </a>
      <a class="bottom-nav__item" href="detail.html">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-stats-2.png" alt="">
        统计
      </a>
      <a class="bottom-nav__item" href="#">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-profile-2.png" alt="">
        我的
      </a>
    </nav>
  </div>
</body>
</html>
