<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>专注目标 · UI 原型</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
  <div class="phone-frame">
    <div class="page-bg"><img src="../assets/goals/page-bg.png" alt=""></div>

    <div class="page-scroll page-content">
      <header class="hero">
        <h1 class="hero__title">专注目标</h1>
        <p class="hero__subtitle">设定目标 · 专注执行 · 追踪进度</p>
        <img class="hero__monster" src="../assets/goals/hero-monster.png" alt="">
      </header>

      <section class="summary-card">
        <img class="summary-card__bg" src="../assets/goals/summary-card-bg.png" alt="">
        <div class="summary-card__content">
          <div>
            <div class="summary-card__label">今日专注时长</div>
            <div><span class="summary-card__value">4.2</span><span class="summary-card__unit">小时</span></div>
            <div class="summary-card__goal">目标 6.0 小时</div>
          </div>
          <img class="summary-card__ring" src="../assets/goals/circle-progress.png" alt="70% 完成度">
        </div>
      </section>

      <div class="section-header">
        <h2 class="section-header__title">我的目标</h2>
        <button class="btn-outline">
          <img src="../assets/goals/icon-plus.png" alt="">
          新建目标
        </button>
      </div>

      <article class="goal-item">
        <img class="goal-item__icon-img" src="../assets/goals/icon-rocket.png" alt="">
        <div class="goal-item__body">
          <div class="goal-item__title">提升产品设计能力</div>
          <div class="goal-item__desc">每天专注学习设计2小时</div>
          <div class="goal-item__meta">
            <div class="progress-figma">
              <img class="progress-figma__track" src="../assets/goals/progress-track.png" alt="">
              <div class="progress-figma__fill-wrap" style="width:70%">
                <img class="progress-figma__fill" src="../assets/goals/progress-fill-70.png" alt="">
              </div>
            </div>
            <span class="goal-item__progress-text">1.4/2.0小时</span>
          </div>
        </div>
      </article>

      <article class="goal-item">
        <img class="goal-item__icon-img goal-item__icon-img--md" src="../assets/goals/icon-book.png" alt="">
        <div class="goal-item__body">
          <div class="goal-item__title">阅读12本书</div>
          <div class="goal-item__desc">本月阅读目标</div>
          <div class="goal-item__meta">
            <div class="progress-figma">
              <img class="progress-figma__track" src="../assets/goals/progress-track.png" alt="">
              <div class="progress-figma__fill-wrap" style="width:42%">
                <img class="progress-figma__fill" src="../assets/goals/progress-fill-42.png" alt="">
              </div>
            </div>
            <span class="goal-item__progress-text">5/12本</span>
          </div>
        </div>
      </article>

      <article class="goal-item">
        <img class="goal-item__icon-img goal-item__icon-img--md" src="../assets/goals/icon-sport.png" alt="">
        <div class="goal-item__body">
          <div class="goal-item__title">保持健康生活</div>
          <div class="goal-item__desc">每周运动3次</div>
          <div class="goal-item__meta">
            <div class="progress-figma">
              <img class="progress-figma__track" src="../assets/goals/progress-track.png" alt="">
              <div class="progress-figma__fill-wrap" style="width:33%">
                <img class="progress-figma__fill" src="../assets/goals/progress-fill-33.png" alt="">
              </div>
            </div>
            <span class="goal-item__progress-text">1/3次</span>
          </div>
        </div>
      </article>

      <article class="goal-item">
        <img class="goal-item__icon-img goal-item__icon-img--sm" src="../assets/goals/icon-leaf.png" alt="">
        <div class="goal-item__body">
          <div class="goal-item__title">学习新技能</div>
          <div class="goal-item__desc">掌握Figma高级功能</div>
          <div class="goal-item__meta">
            <div class="progress-figma">
              <img class="progress-figma__track" src="../assets/goals/progress-track.png" alt="">
              <div class="progress-figma__fill-wrap" style="width:30%">
                <img class="progress-figma__fill" src="../assets/goals/progress-fill-30.png" alt="">
              </div>
            </div>
            <span class="goal-item__progress-text">30%</span>
          </div>
        </div>
      </article>
    </div>

    <nav class="bottom-nav">
      <a class="bottom-nav__item" href="goals.html">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-home.png" alt="">
        首页
      </a>
      <a class="bottom-nav__item bottom-nav__item--active" href="goals.html">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-goals-active.png" alt="">
        目标
      </a>
      <a class="bottom-nav__item" href="focus.html">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-focus.png" alt="">
        专注
      </a>
      <a class="bottom-nav__item" href="detail.html">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-stats.png" alt="">
        统计
      </a>
      <a class="bottom-nav__item" href="#">
        <img class="bottom-nav__icon-img" src="../assets/shared/nav-profile.png" alt="">
        我的
      </a>
    </nav>
  </div>
</body>
</html>
